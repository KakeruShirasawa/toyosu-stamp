<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豊洲オクトーバーフェスト スタンプラリー</title>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* ビールとオクトーバーフェストをイメージしたデザイン */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            background-color: #FFF9F0; /* 泡のような優しい白 */
            color: #5A3D2B; /* 濃いブラウン */
        }
        .header {
            background-color: #E69138; /* ビールの黄金色 */
            color: white;
            padding: 20px 10px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 10px rgba(230, 145, 56, 0.3);
        }
        h1 { margin: 0; font-size: 22px; }
        .subtitle { font-size: 14px; margin-top: 5px; opacity: 0.9; }
        
        .container { padding: 20px; max-width: 480px; margin: 0 auto; }
        .welcome-text { font-size: 16px; font-weight: bold; margin-bottom: 20px; }

        /* 6マスのスタンプ台紙 */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2列に並べる */
            gap: 15px;
            margin-bottom: 30px;
        }
        .stamp-box {
            background-color: white;
            border: 3px dashed #D1BFAE;
            border-radius: 15px;
            padding: 20px 10px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .stamp-box.got {
            border: 3px solid #E69138;
            background-color: #FFF2E0;
        }
        .maker-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #8A6D5B; }
        .stamp-icon { font-size: 40px; color: #ddd; }
        .got .stamp-icon { color: #E69138; animation: pop 0.5s ease-out; }

        /* スタンプ獲得アニメーション */
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* スキャンボタン */
        .btn { 
            display: block; 
            width: 100%;
            box-sizing: border-box;
            padding: 18px; 
            background-color: #E69138; 
            color: white; 
            border: none; 
            border-radius: 30px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(230, 145, 56, 0.4);
        }
        .btn:active { transform: scale(0.98); }
        
        #notification {
            display: none;
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>豊洲オクトーバーフェスト</h1>
        <div class="subtitle">〜 ビールメーカー6社 飲み歩きラリー 〜</div>
    </div>

    <div class="container">
        <div id="user-name" class="welcome-text">LINE確認中...</div>

        <!-- メッセージ表示エリア -->
        <div id="notification"></div>

        <!-- スタンプ台紙（6カ所） -->
        <div class="stamp-grid">
            <div class="stamp-box" id="box-1">
                <div class="maker-name">メーカーA</div>
                <div class="stamp-icon" id="icon-1">⚪️</div>
            </div>
            <div class="stamp-box" id="box-2">
                <div class="maker-name">メーカーB</div>
                <div class="stamp-icon" id="icon-2">⚪️</div>
            </div>
            <div class="stamp-box" id="box-3">
                <div class="maker-name">メーカーC</div>
                <div class="stamp-icon" id="icon-3">⚪️</div>
            </div>
            <div class="stamp-box" id="box-4">
                <div class="maker-name">メーカーD</div>
                <div class="stamp-icon" id="icon-4">⚪️</div>
            </div>
            <div class="stamp-box" id="box-5">
                <div class="maker-name">メーカーE</div>
                <div class="stamp-icon" id="icon-5">⚪️</div>
            </div>
            <div class="stamp-box" id="box-6">
                <div class="maker-name">メーカーF</div>
                <div class="stamp-icon" id="icon-6">⚪️</div>
            </div>
        </div>

        <!-- アプリ内のカメラ（Scan QR）を起動するボタン -->
        <button id="scan-btn" class="btn" style="display: none;">📷 QRコードを読み取る</button>
    </div>

    <script>
        // 正しいLIFF ID
        const MY_LIFF_ID = "2010727861-qqi11OFO";
        
        // 取得したスタンプを一時保存するリスト（今回はスマホ本体に保存します）
        let collectedStamps = JSON.parse(localStorage.getItem('toyosu_beer_stamps')) || [];

        async function startApp() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // ユーザー名の表示
                const profile = await liff.getProfile();
                document.getElementById("user-name").innerText = `${profile.displayName} さん、乾杯！🍻`;

                // 画面を開いた時に、すでに持っているスタンプを表示する
                updateStampCard();

                // URLからアクセスしてきた場合のスタンプ処理（例: ?spot=1）
                const urlParams = new URLSearchParams(window.location.search);
                const spotId = urlParams.get('spot');
                if (spotId) {
                    getStamp(spotId);
                }

                // カメラボタンの有効化
                const scanBtn = document.getElementById("scan-btn");
                scanBtn.style.display = "block";
                scanBtn.addEventListener("click", async () => {
                    try {
                        const result = await liff.scanCodeV2();
                        const scannedUrl = new URL(result.value);
                        const nextSpotId = scannedUrl.searchParams.get("spot");
                        
                        if (nextSpotId) {
                            getStamp(nextSpotId);
                        } else {
                            alert("このQRコードはスタンプラリー用ではありません。");
                        }
                    } catch (err) {
                        console.error(err);
                    }
                });

            } catch (error) {
                console.error("エラー", error);
            }
        }

        // スタンプを獲得する処理
        function getStamp(spotId) {
            // スポットIDが1〜6の範囲かチェック
            if(spotId >= 1 && spotId <= 6) {
                if(!collectedStamps.includes(spotId)) {
                    // まだ持っていないスタンプならリストに追加して保存
                    collectedStamps.push(spotId);
                    localStorage.setItem('toyosu_beer_stamps', JSON.stringify(collectedStamps));
                    
                    // 画面上にお知らせを表示
                    const notif = document.getElementById("notification");
                    notif.innerText = `🎉 スタンプをGETしました！`;
                    notif.style.display = "block";
                    setTimeout(() => { notif.style.display = "none"; }, 3000); // 3秒で消す
                } else {
                    alert("このメーカーのスタンプはすでに獲得済みです！");
                }
                updateStampCard();
            }
        }

        // スタンプ台紙の見た目を更新する処理
        function updateStampCard() {
            collectedStamps.forEach(id => {
                const box = document.getElementById(`box-${id}`);
                const icon = document.getElementById(`icon-${id}`);
                if(box && icon) {
                    box.classList.add("got");
                    icon.innerText = "🍻"; // GETしたらビールのアイコンに変わる
                }
            });
        }

        startApp();
    </script>
</body>
</html>
